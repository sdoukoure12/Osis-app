#!/usr/bin/env python3
"""OSIS-PRO Admin Panel (Flask)"""
from flask import Flask, render_template, jsonify, request
from flask_cors import CORS
import sqlite3, os

app = Flask(__name__)
CORS(app)
DATABASE = os.path.join(os.path.dirname(__file__), '..', 'backend', 'data', 'osis.db')

def get_db():
    conn = sqlite3.connect(DATABASE)
    conn.row_factory = sqlite3.Row
    return conn

@app.route('/')
def index():
    return render_template('dashboard.html')

@app.route('/api/admin/stats')
def stats():
    db = get_db()
    users = db.execute("SELECT COUNT(*) FROM users").fetchone()[0]
    intentions = db.execute("SELECT COUNT(*) FROM intentions WHERE status='active'").fetchone()[0]
    donations = db.execute("SELECT COALESCE(SUM(amount),0) FROM donations").fetchone()[0]
    return jsonify({'users': users, 'intentions': intentions, 'donations': donations})

@app.route('/api/admin/users')
def users():
    db = get_db()
    rows = db.execute("SELECT id, username, email, balance, level FROM users ORDER BY id DESC LIMIT 50").fetchall()
    return jsonify([dict(r) for r in rows])

if __name__ == '__main__':
    app.run(host='0.0.0.0', port=8001, debug=False)
EOF

